<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>РџР»Р°РЅРёСЂРѕРІС‰РёРє</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0A0A0F;
            --secondary: #1A1A2E;
            --accent: #00D9FF;
            --accent2: #00FF88;
            --glow: #0080FF;
            --text: #E0E0E0;
            --text-muted: #8892a0;
            --warning: #FF6B00;
            --success: #00FF88;
            --danger: #FF3366;
            --border: rgba(0, 217, 255, 0.15);
            
            --gradient-javis: linear-gradient(135deg, rgba(0, 128, 255, 0.2) 0%, rgba(0, 217, 255, 0.1) 100%);
            --gradient-matrix: linear-gradient(180deg, rgba(0, 255, 136, 0.1) 0%, transparent 100%);
            --gradient-card: linear-gradient(145deg, #1A1A2E 0%, #12121f 100%);
            
            --glow-cyan: 0 0 20px rgba(0, 217, 255, 0.3), 0 0 40px rgba(0, 217, 255, 0.1);
            --glow-green: 0 0 20px rgba(0, 255, 136, 0.3), 0 0 40px rgba(0, 255, 136, 0.1);
            --glow-blue: 0 0 20px rgba(0, 128, 255, 0.3), 0 0 40px rgba(0, 128, 255, 0.1);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary);
            min-height: 100vh;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text);
            background-image: 
                radial-gradient(ellipse at top, rgba(0, 128, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, #0A0A0F 0%, #0d0d14 100%);
            background-attachment: fixed;
        }



        h1, h2, h3, h4, h5, h6 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
            letter-spacing: 0.5px;
        }

        h1 { font-size: 28px; font-weight: 700; }
        h2 { font-size: 24px; font-weight: 600; }
        h3 { font-size: 20px; font-weight: 500; }

        .title-glow {
            text-shadow: 
                0 0 10px var(--accent),
                0 0 20px var(--accent),
                0 0 40px var(--glow);
        }

        .text-matrix {
            color: var(--accent2);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        .header {
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.95) 0%, rgba(26, 26, 46, 0.8) 100%);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            margin: -16px -16px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .header-user {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 51, 102, 0.5);
            color: var(--danger);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 51, 102, 0.1);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
            border-color: var(--danger);
        }

        .card {
            background: var(--gradient-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
            border-color: var(--accent);
        }

        .card-clickable {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card-clickable:active {
            transform: scale(0.98);
        }

        .card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-weight: 500;
        }

        .card p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--glow) 100%);
            color: var(--primary);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            box-shadow: var(--glow-cyan);
            transform: translateY(-2px);
        }

        .btn:active {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent2) 0%, #00cc6a 100%);
            color: var(--primary);
        }

        .btn-success:hover {
            box-shadow: var(--glow-green);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #cc0044 100%);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            box-shadow: var(--glow-cyan);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning) 0%, #cc5500 100%);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: rgba(0, 217, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
            font-family: 'Inter', sans-serif;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            color: var(--accent);
            font-weight: 500;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background: rgba(10, 10, 15, 0.8);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2), inset 0 0 10px rgba(0, 217, 255, 0.05);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
        }

        .status-new {
            background: rgba(0, 128, 255, 0.2);
            color: #3399ff;
            border-color: #3399ff;
        }

        .status-planned {
            background: rgba(255, 107, 0, 0.2);
            color: #FF6B00;
            border-color: #FF6B00;
        }

        .status-in_progress {
            background: rgba(0, 217, 255, 0.2);
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .status-waiting_materials {
            background: rgba(255, 0, 204, 0.2);
            color: #ff00cc;
            border-color: #ff00cc;
        }

        .status-done {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent2);
            border-color: var(--accent2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .status-postponed {
            background: rgba(136, 146, 160, 0.2);
            color: var(--text-muted);
            border-color: var(--text-muted);
        }

        @keyframes blink-red {
            0%, 100% { 
                background: var(--gradient-card);
                border-color: var(--danger);
                box-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
            }
            50% { 
                background: rgba(255, 51, 102, 0.15);
                border-color: var(--danger);
                box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
            }
        }

        .overdue {
            animation: blink-red 1.5s ease-in-out infinite;
            border: 2px solid var(--danger) !important;
        }

        .overdue .list-item-title {
            color: var(--danger);
        }

        .status-draft {
            background: rgba(136, 146, 160, 0.2);
            color: var(--text-muted);
            border-color: var(--text-muted);
        }

        .status-pending {
            background: rgba(255, 107, 0, 0.2);
            color: #FF6B00;
            border-color: #FF6B00;
            animation: pulse 2s infinite;
        }

        .status-approved {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent2);
            border-color: var(--accent2);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .status-rejected {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .status-in_order {
            background: rgba(0, 128, 255, 0.2);
            color: #3399ff;
            border-color: #3399ff;
        }

        .status-ready_for_receipt {
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
            border-color: #FFA500;
        }

        .status-received {
            background: rgba(138, 43, 226, 0.2);
            color: #8A2BE2;
            border-color: #8A2BE2;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
            padding-bottom: 8px;
        }

        .nav::-webkit-scrollbar {
            height: 4px;
        }

        .nav::-webkit-scrollbar-track {
            background: var(--secondary);
            border-radius: 2px;
        }

        .nav::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        .nav-btn {
            background: var(--secondary);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            flex: 1 1 auto;
            min-width: 80px;
            max-width: 150px;
            text-align: center;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--glow) 100%);
            color: var(--primary);
            border-color: var(--accent);
            font-weight: 600;
            box-shadow: var(--glow-cyan);
        }

        .list-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            background: var(--secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }

        .list-item:hover {
            background: rgba(0, 217, 255, 0.05);
            border-color: var(--accent);
        }

        .list-item:active {
            background: rgba(0, 217, 255, 0.1);
        }

        .list-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }

        .list-item-title {
            font-weight: 500;
            color: var(--text);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        .list-item-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .loading-spinner {
            border: 3px solid var(--secondary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .swipeable-item {
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .swipe-actions {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            background: linear-gradient(90deg, transparent, var(--danger));
            padding-right: 16px;
        }

        .swipe-actions.show {
            transform: translateX(0);
        }

        .swipe-delete-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .swipe-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .swipe-overlay.show {
            display: block;
        }

        .auth-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background: 
                radial-gradient(ellipse at top, rgba(0, 128, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #0A0A0F 0%, #12121f 100%);
            position: relative;
            z-index: 1;
        }

        .auth-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 136, 0.02) 2px,
                    rgba(0, 255, 136, 0.02) 4px
                );
            pointer-events: none;
        }

        .auth-box {
            background: var(--gradient-card);
            padding: 32px 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .auth-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 8px;
            color: var(--accent);
            font-size: 28px;
            text-shadow: 0 0 20px var(--accent);
            font-family: 'Orbitron', sans-serif;
        }

        .auth-box .subtitle {
            text-align: center;
            margin-bottom: 24px;
            color: var(--text-muted);
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        .auth-tab:hover {
            color: var(--accent);
        }

        .auth-tab.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .auth-error {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid var(--danger);
            font-family: 'JetBrains Mono', monospace;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            margin-bottom: 16px;
        }

        .tab {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            font-weight: 500;
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
        }

        .tab:hover {
            color: var(--accent);
        }

        .tab.active {
            border-bottom-color: var(--accent);
            color: var(--accent);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--gradient-card);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid var(--border);
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--secondary);
            z-index: 10;
        }

        .modal-header h3 {
            font-size: 18px;
            color: var(--accent);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            color: var(--danger);
            text-shadow: 0 0 10px var(--danger);
        }

        .modal-body {
            padding: 20px;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .actions .btn {
            flex: 1;
        }

        .calendar {
            background: var(--gradient-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: linear-gradient(180deg, var(--secondary) 0%, rgba(26, 26, 46, 0.8) 100%);
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }

        .calendar-nav {
            background: none;
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .calendar-nav:hover {
            background: rgba(0, 217, 255, 0.1);
            box-shadow: var(--glow-cyan);
        }

        .calendar-month {
            font-size: 16px;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
        }

        .calendar-weekdays {

        async function getProjects() {
            const { data: projects, error } = await supabase
                .from('projects')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) throw error;
            
            const creatorIds = [...new Set(projects?.map(p => p.created_by).filter(Boolean))];
            
            let creators = {};
            if (creatorIds.length > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', creatorIds);
                users?.forEach(u => creators[u.id] = u);
            }
            
            return (projects || []).map(p => ({
                ...p,
                users: creators[p.created_by] || null
            }));
        }

            return (projects || []).map(p => ({

                    .in('id', projectIds);
                projects?.forEach(p => projectsMap[p.id] = p);

            let usersMap = {};

                    .from('users')
                    .select('id, name')

        function renderTaskCard(task, showProject = false) {
            const isManager = currentUserProfile?.role === 'manager';
            const isWorker = currentUserProfile?.role === 'worker';
            const canEdit = isManager || (isWorker && String(task.assignee_id) === String(currentUserProfile?.id));

            const now = new Date();
            const isOverdue = task.due_date && new Date(task.due_date) < now && task.status !== 'done' && task.status !== 'postponed';
            const overdueClass = isOverdue ? ' overdue' : '';

            let descriptionHtml = '';
            if (task.description && task.description.trim() !== '') {
                const shortDesc = task.description.length > 50 ? task.description.substring(0, 50) + '...' : task.description;
                descriptionHtml = `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;line-height:1.3;">${shortDesc}</div>`;
            }

            let dueDateHtml = '';
            if (task.due_date) {
                const dueDateParts = task.due_date.split('T')[0].split('-');
                const dueDate = new Date(dueDateParts[0], dueDateParts[1] - 1, dueDateParts[2]);
                const dueDateStr = dueDate.toLocaleDateString('ru-RU');
                const isDueToday = dueDate.toDateString() === now.toDateString();
                const dueDateColor = isOverdue ? 'color: var(--danger);' : (isDueToday ? 'color: var(--warning);' : '');
                dueDateHtml = `<div style="font-size:11px;${dueDateColor}margin-top:4px;">рџ“… ${dueDateStr}</div>`;
            }

            return `
                <div class="card card-clickable${overdueClass}" data-id="${task.id}" data-type="task" onclick="showTaskDetail('${task.id}')">
                    <div class="list-item-header">
                        <div class="list-item-title">${task.title}</div>
                        <span class="status status-${task.status}">${getStatusLabel(task.status)}</span>
                    </div>
                    <div class="list-item-subtitle">
                        ${showProject && task.projects ? task.projects.name + ' - ' : ''}
                        ${task.users?.name || 'РќРµ РЅР°Р·РЅР°С‡РµРЅ'}
                    </div>
                    ${dueDateHtml}
                    ${descriptionHtml}
                    ${canEdit ? `<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-outline" style="padding:4px 8px;font-size:12px" onclick="event.stopPropagation();editTask('${task.id}')">вњЋ</button></div>` : ''}
                </div>
            `;
        }

        async function enrichInstallations(installations) {
            if (!installations || installations.length === 0) return [];

            const projectIds = [...new Set(installations.map(i => i.project_id).filter(Boolean))];
            const userIds = [...new Set(installations.map(i => i.assignee_id).filter(Boolean))];

            let projectsMap = {};
            if (projectIds.length > 0) {
                const { data: projects } = await supabase
                    .from('projects')
                    .select('id, name')
                    .in('id', projectIds);
                projects?.forEach(p => projectsMap[p.id] = p);
            }

            let usersMap = {};
            if (userIds.length > 0) {
                const { data: users } = await supabase
                    .from('users')
                    .select('id, name')
                    .in('id', userIds);
                users?.forEach(u => usersMap[u.id] = u);
            }

            return installations.map(i => ({
                ...i,
                projects: projectsMap[i.project_id] || null,
                users: usersMap[i.assignee_id] || null
            }));
        }

        window.saveEditedTask = async function(taskId) {
            const title = document.getElementById('editTaskTitle').value;
            const description = document.getElementById('editTaskDescription').value;
            const project_id = document.getElementById('editTaskProject').value;
            const assignee_id = document.getElementById('editTaskAssignee').value;
            const status = document.getElementById('editTaskStatus').value;

            const isManager = currentUserProfile?.role === 'manager';
            let due_date = null;
            
            if (isManager) {
                const due_date_raw = document.getElementById('editTaskDueDate').value;
                if (due_date_raw && /^\d{4}-\d{2}-\d{2}$/.test(due_date_raw)) {
                    due_date = due_date_raw;
                }
            }

            if (!title) {
                showToast('Р’РІРµРґРёС‚Рµ РЅР°Р·РІР°РЅРёРµ Р·Р°РґР°С‡Рё');
                return;
            }

            try {
                const { data: currentTask } = await supabase
                    .from('tasks')
                    .select('assignee_id')
                    .eq('id', taskId)
                    .single();
                
                const previousAssigneeId = currentTask?.assignee_id;
                const newAssigneeId = assignee_id || null;
                
                const updateData = { 
                    title, 
                    description, 
                    project_id: project_id || null, 
                    assignee_id: assignee_id || null, 
                    status,
                    updated_at: new Date().toISOString() 
                };
                
                if (due_date) {
                    updateData.due_date = due_date;
                }
                
                console.log('Updating task with data:', updateData);
                
                const { error } = await supabase
                    .from('tasks')
                    .update(updateData)
                    .eq('id', taskId);

                if (error) throw error;

                if (newAssigneeId && newAssigneeId !== previousAssigneeId) {
                    const { data: assigneeUser } = await supabase

        async function getPurchaseRequests() {
            const userId = currentUserProfile?.id;
            const isManager = isElevatedUser();

            let query = supabase
                .from('purchase_requests')
                .select('id, status, created_at, task_id, installation_id, created_by, comment, receipt_address, received_at')
                .order('created_at', { ascending: false });

            if (!isManager) {
                query = query.eq('created_by', userId);
            }

            const { data, error } = await query;
            if (error) throw error;

            if (!data || data.length === 0) return [];

            const taskIds = [...new Set(data?.map(pr => pr.task_id).filter(Boolean) || [])];
            const installationIds = [...new Set(data?.map(pr => pr.installation_id).filter(Boolean) || [])];
            const creatorIds = [...new Set(data?.map(pr => pr.created_by).filter(Boolean) || [])];

            const [tasksData, installationsData, usersData] = await Promise.all([
                taskIds.length > 0 ? supabase.from('tasks').select('id, title, project_id').in('id', taskIds) : Promise.resolve({ data: [] }),
                installationIds.length > 0 ? supabase.from('installations').select('id, title, project_id').in('id', installationIds) : Promise.resolve({ data: [] }),
                creatorIds.length > 0 ? supabase.from('users').select('id, name').in('id', creatorIds) : Promise.resolve({ data: [] })
            ]);

            const tasksMap = {};
            const installationsMap = {};
            const creatorsMap = {};
            const projectIds = new Set();

            tasksData.data?.forEach(t => {
                tasksMap[t.id] = t;
                if (t.project_id) projectIds.add(t.project_id);
            });
            installationsData.data?.forEach(i => {
                installationsMap[i.id] = i;
                if (i.project_id) projectIds.add(i.project_id);
            });
            usersData.data?.forEach(u => creatorsMap[u.id] = u);

            let projectsMap = {};
            if (projectIds.size > 0) {
                const { data: projects } = await supabase
                    .from('projects')
                    .select('id, name')
                    .in('id', Array.from(projectIds));
                projects?.forEach(p => projectsMap[p.id] = p);
            }

            return (data || []).map(pr => ({
                ...pr,
                users: creatorsMap[pr.created_by] || null,
                tasks: tasksMap[pr.task_id] || null,
                installations: installationsMap[pr.installation_id] || null,
                project: pr.task_id && tasksMap[pr.task_id] ? projectsMap[tasksMap[pr.task_id].project_id] || null :
                         pr.installation_id && installationsMap[pr.installation_id] ? projectsMap[installationsMap[pr.installation_id].project_id] || null : null
            }));
        }

        function parseDueDate(dateStr) {
            if (!dateStr) return null;
            
            if (/^\d{4}-\d{2}-\d{2}T/.test(dateStr)) {
                return dateStr.split('T')[0];
            }
            
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
                return dateStr;
            }
            
            return dateStr;
        }

        window.createPR = async function() {
            const items = [];
            let i = 1;
            
            while (document.getElementById('prItem' + i + 'Name')) {
                const name = document.getElementById('prItem' + i + 'Name').value;
                if (name) {
                    items.push({
                        name,
                        quantity: parseFloat(document.getElementById('prItem' + i + 'Qty').value) || 1,
                        unit: document.getElementById('prItem' + i + 'Unit').value,
                        note: document.getElementById('prItem' + i + 'Note').value
                    });
                }
                i++;
            }
            
            if (items.length === 0) {
                showToast('Р”РѕР±Р°РІСЊС‚Рµ С…РѕС‚СЏ Р±С‹ РѕРґРЅСѓ РїРѕР·РёС†РёСЋ');
                return;
            }
            
            try {
                const prData = {
                    status: 'pending',
                    created_by: currentUserProfile?.id
                };
                
                if (prType === 'task' && prRefId) {
                    prData.task_id = prRefId;
                } else if (prType === 'installation' && prRefId) {
                    prData.installation_id = prRefId;
                }
                
                const { data: pr, error: prError } = await supabase
                    .from('purchase_requests')
                    .insert([prData])
                    .select()

                if (prError) throw prError;
                
                const itemsWithPRId = items.map(item => ({

                const { error: itemsError } = await supabase

        function matrixRain() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const matrix = "г‚ўг‚¤г‚¦г‚Ёг‚Єг‚«г‚­г‚Їг‚±г‚іг‚µг‚·г‚№г‚»г‚Ѕг‚їгѓЃгѓ„гѓ†гѓ€гѓЉгѓ‹гѓЊгѓЌгѓЋгѓЏгѓ’гѓ•гѓгѓ›гѓћгѓџгѓ гѓЎгѓўгѓ¤гѓ¦гѓЁгѓ©гѓЄгѓ«гѓ¬гѓ­гѓЇгѓІгѓі0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const matrixArray = matrix.split("");

            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];

            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00FF88';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = matrixArray[Math.floor(Math.random() * matrixArray.length)];

                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }

                    drops[i]++;
                }
            }

            setInterval(draw, 80);
        }

        let touchStartX = 0;
        let touchStartY = 0;
        let currentSwipeItem = null;

        function initSwipeHandlers() {
            document.querySelectorAll('.card').forEach(card => {
                if (!card.closest('.modal')) {
                    card.addEventListener('touchstart', handleTouchStart, { passive: true });
                    card.addEventListener('touchmove', handleTouchMove, { passive: false });
                    card.addEventListener('touchend', handleTouchEnd);
                }
            });
        }

        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            currentSwipeItem = e.currentTarget;
        }

        function handleTouchMove(e) {
            if (!currentSwipeItem) return;
            
            const touchCurrentX = e.touches[0].clientX;
            const touchCurrentY = e.touches[0].clientY;
            
            const diffX = touchCurrentX - touchStartX;
            const diffY = touchCurrentY - touchStartY;
            
            if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                e.preventDefault();
                
                if (diffX < 0) {
                    currentSwipeItem.style.transform = `translateX(${diffX}px)`;
                    
                    if (diffX < -100) {
                        currentSwipeItem.style.background = 'rgba(255, 51, 102, 0.2)';
                    } else {
                        currentSwipeItem.style.background = '';
                    }
                } else if (diffX > 0) {
                    currentSwipeItem.style.transform = `translateX(${diffX}px)`;
                    
                    if (diffX > 100) {
                        currentSwipeItem.style.background = 'rgba(0, 217, 255, 0.2)';
                    } else {
                        currentSwipeItem.style.background = '';
                    }
                }
            }
        }

        function handleTouchEnd(e) {
            if (!currentSwipeItem) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diffX = touchEndX - touchStartX;
            
            const itemId = currentSwipeItem.getAttribute('data-id');
            const itemType = currentSwipeItem.getAttribute('data-type');
            
            if (diffX < -100) {
                if (itemId && itemType) {
                    showDeleteConfirmation(itemId, itemType);
                }
            }
            else if (diffX > 100) {
                if (itemId && itemType) {
                    if (itemType === 'task') {
                        showTaskDetail(itemId);
                    } else if (itemType === 'installation') {
                        window.showInstallationDetail(itemId);
                    } else if (itemType === 'pr') {
                        showPRDetailModal(itemId);
                    }
                }
            }
            
            currentSwipeItem.style.transform = '';
            currentSwipeItem.style.background = '';
            currentSwipeItem = null;
        }
