name: KorneoIOS
options:
  minimumXcodeGenVersion: 2.43.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.korneo.ios
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Korneo iOS
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Маршруты и карта требуют доступ к геолокации.
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Приложению нужен доступ к фото для загрузки аватара.
    INFOPLIST_KEY_SUPABASE_URL: $(SUPABASE_URL)
    INFOPLIST_KEY_SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
    INFOPLIST_KEY_DAICHI_TOKEN: $(DAICHI_TOKEN)
packages:
  CoreXLSX:
    url: https://github.com/CoreOffice/CoreXLSX.git
    from: 0.14.2
targets:
  KorneoIOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: KorneoIOS
    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig
    settings:
      configs:
        Debug:
          base:
            SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies:
      - package: CoreXLSX
